<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryan Mora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/components/subtitle.css" />
    <link rel="stylesheet" href="css/components/box.css" />
    <link rel="stylesheet" href="css/components/button.css" />
    <link rel="stylesheet" href="css/components/action.css" />
    <link rel="stylesheet" href="css/components/main-title.css" />
    <link rel="stylesheet" href="css/components/header.css" />
    <link rel="stylesheet" href="css/components/avatar.css" />
    <link rel="stylesheet" href="css/components/banner.css" />
    <link rel="stylesheet" href="css/components/section.css" />
    <link rel="stylesheet" href="css/components/wrapper-skill.css" />
    <link rel="stylesheet" href="css/components/skill-tec.css">
    <link rel="stylesheet" href="css/components/progress-bar.css">
    <link rel="stylesheet" href="css/components/card-project.css">
  </head>
  <body>
    <header class="header">
      <img class="avatar" src="assets/img/avatar.png" alt="Avatar do Ryan" />
      <nav>
        <a class="action" href="" lang="en">Skills</a>
        <a class="action" href="">Projetos</a>
        <a class="action" href="">Sobre</a>
        <a class="action" href="">Contatos</a>
        <a class="button" lang="en">Download CV</a>
      </nav>
    </header>
    <section class="banner">
      <div class="wrapper">
        <div class="box">
          <h2 class="main-title">Ryan Mora</h1>
          <h3 class="subtitle">FrontEnd Developer</h2>
        </div>
        <div class="navigation">
          <a class="button" href="" lang="en">Download CV</a>
          <a class="button" href="">Contatos</a>
        </div>
      </div>
    </section>
    <section class="section">
      <h2 class="main-title -second">Skills</h2>

      <div class="wrapper-skill">
      <article class="skill-tec">
        <img class="icon" src="img/html.png" alt="Logo do HTML">
        <div class="right">
          <h3 class="title">HTML</h3>
            <progress class="progress-bar" max="100" value="80">
              80%
            </progress>
          </div>
      </article>
            <article class="skill-tec">
        <img class="icon" src="img/nodejs.png" alt="Logo do Node.js">
        <div class="right">
          <h3 class="title">Node.js</h3>
            <progress class="progress-bar" max="100" value="90">
              90%
            </progress>
          </div>
      </article>
            <article class="skill-tec">
        <img class="icon" src="img/css3.png" alt="Logo do CSS">
        <div class="right">
          <h3 class="title">CSS</h3>
            <progress class="progress-bar" max="100" value="80">
              80%
            </progress>
          </div>
      </article>
            <article class="skill-tec">
        <img class="icon" src="img/tdd.png" alt="Logo do TDD">
        <div class="right">
          <h3 class="title">TDD</h3>
            <progress class="progress-bar" max="100" value="40">
              40%
            </progress>
          </div>
      </article>
            <article class="skill-tec">
        <img class="icon" src="img/js.png" alt="Logo do JavaScript">
        <div class="right">
          <h3 class="title">JavaScript</h3>
            <progress class="progress-bar" max="100" value="90">
              90%
            </progress>
          </div>
      </article>
            <article class="skill-tec">
        <img class="icon" src="img/restapi.png" alt="Logo do REST API">
        <div class="right">
          <h3 class="title">REST API</h3>
            <progress class="progress-bar" max="100" value="30">
              30%
            </progress>
          </div>
      </article>
            <article class="skill-tec">
        <img class="icon" src="img/react.png" alt="Logo do React">
        <div class="right">
          <h3 class="title">React</h3>
            <progress class="progress-bar" max="100" value="70">
              70%
            </progress>
          </div>
      </article>
            <article class="skill-tec">
        <img class="icon" src="img/ux.png" alt="Logo do UX">
        <div class="right">
          <h3 class="title">UX</h3>
            <progress class="progress-bar" max="100" value="55">
              55%
            </progress>
      </article>
          </div>
    </section>
    <section class="section -bgBlack -bdFirst">
      <h2 class="main-title -second">Projetos</h2>
        <figure class="card-project -blue">
          <img class="logo" src="/img/collabcode.png" alt="Logo do CollabCode">
        </figure>
                <figure class="card-project">
          <img class="logo" src="/img/firedlabs.png" alt="Logo do FiredLabs">
        </figure>
                <figure class="card-project">
          <img class="logo" src="/img/avatar.png" alt="Logo do Avatar do Ryan">
        </figure>
    </section>
  </body>
</html>
